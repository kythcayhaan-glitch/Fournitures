framework:
    workflows:
        demande_materiel:
            type: state_machine
            audit_trail:
                enabled: true
            marking_store:
                type: method
                property: statut
            supports:
                - App\Entity\DemandeMateriel
            initial_marking: pending
            places:
                - pending
                - rejected
                - delivered
            transitions:
                approve:
                    from: pending
                    to: delivered
                    metadata:
                        label: 'Approuver'
                reject:
                    from: pending
                    to: rejected
                    metadata:
                        label: 'Rejeter'
